version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: bloodlink-db
    restart: always
    environment:
      POSTGRES_DB: bloodlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bloodlink-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: